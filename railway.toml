[build]
builder = "DOCKERFILE"
dockerfilePath = "server/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "server"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "server/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"

[[services]]
name = "client"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "client/Dockerfile"

[services.deploy]
startCommand = "nginx -g 'daemon off;'"